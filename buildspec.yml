version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - npm ci
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - aws s3 sync out/ s3://vocab-app-frontend-352311918363-ap-southeast-1-an --delete
      - aws cloudfront create-invalidation --distribution-id E2V7L24MBIFG8D --paths "/*"